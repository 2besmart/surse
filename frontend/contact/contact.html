<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2beSMART</title>
    <link rel="icon" href="images/logo.png" type="image/x-icon">

    <link rel="stylesheet" href="style3.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

</head>

<body>
    <section class="header">
        <nav>
            <a href="index.html"><img src="images/logo2.png"></a>
            <div class="nav-links" id="navLinks">
                <i class="fa fa-times" onclick="hideMenu()"></i>
                <ul>
                    <li><a href="index.html">Acasă</a></li>
                    <li><a href="info.html">Resurse</a></li>
                    <li><a href="simulare.html">Simulator</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </div>
            <i class="fa fa-bars" onclick="showMenu()"></i>
        </nav>

        <br>
        <br>
        <div class="text-box">
            <h1>Contactați-ne</h1>
        </div>

        <svg class="wave wave1" viewBox="0 0 1440 320" preserveAspectRatio="none">
            <path fill="#f60984"
                d="M0,160L80,170C160,180,320,200,480,192C640,184,800,148,960,149C1120,150,1280,190,1440,170L1440,320L0,320Z">
            </path>
        </svg>

        <svg class="wave wave2" viewBox="0 0 1440 320" preserveAspectRatio="none">
            <path fill="#b103ab"
                d="M0,224L80,208C160,192,320,160,480,144C640,128,800,128,960,149C1120,170,1280,214,1440,208L1440,320L0,320Z">
            </path>
        </svg>

        <svg class="wave wave3" viewBox="0 0 1440 320" preserveAspectRatio="none">
            <path fill="#620186"
                d="M0,96L90,112C180,128,360,160,540,165C720,170,900,149,1080,133C1260,117,1380,107,1440,101L1440,320L0,320Z">
            </path>
        </svg>

        <svg class="wave wave4" viewBox="0 0 1440 320" preserveAspectRatio="none">
            <path fill="#2c0271"
                d="M0,170L70,176C140,182,280,192,420,170C560,149,700,96,840,96C980,96,1120,149,1260,165C1400,181,1540,160,1440,160L1440,320L0,320Z">
            </path>
        </svg>

        <svg class="wave wave5" viewBox="0 0 1440 320" preserveAspectRatio="none">
            <path fill="#080149"
                d="M0,128L120,122C240,117,480,107,720,133C960,160,1200,224,1320,256L1440,288L1440,320L0,320Z">
            </path>
        </svg>

    </section>

    <section class="container">
        <div class="contact">
            <div class="contact-col">
                <form id="contactForm">
                    <input type="text" id="name" placeholder="Numele" required>
                    <input type="email" id="email" placeholder="Email" required>
                    <input stype="text" id="subject" placeholder="Subiectul" required>
                    <textarea rows="10" id="message" placeholder="Mesajul" required></textarea>
                    <button type="submit" class="hero-btn-despre">Trimite</button>
                </form>
                <div id="status" style="margin-top: 10px; font-weight: bold; color: #f5f5f5;"></div>
            </div>
            <div class="review">
                <h2>Lasă-ne o recenzie</h2>
                <form id="reviewForm">
                    <div>
                        <label>Numele tău:</label>
                        <input type="text" id="reviewName" required
                            style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;">
                    </div>

                    <div class="review-row">
                        <label>Nota ta:</label>
                        <div id="stars-rating-container">
                            <span class="star" data-value="1" style="color: #ccc; transition: color 0.2s;">★</span>
                            <span class="star" data-value="2" style="color: #ccc; transition: color 0.2s;">★</span>
                            <span class="star" data-value="3" style="color: #ccc; transition: color 0.2s;">★</span>
                            <span class="star" data-value="4" style="color: #ccc; transition: color 0.2s;">★</span>
                            <span class="star" data-value="5" style="color: #ccc; transition: color 0.2s;">★</span>
                        </div>
                        <input type="hidden" id="reviewRating" value="5">
                    </div>

                    <div>
                        <label>Mesajul tău:</label>
                        <textarea id="reviewText" rows="4" required
                            style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; resize: vertical;"></textarea>
                    </div>

                    <button type="submit" class="hero-btn-despre">Trimite Recenzia</button>
                </form>
                <div id="formMessage" style="margin-top: 15px; text-align: center; font-weight: bold;"></div>
            </div>
        </div>
        <div class="reach">

            <div class="chenar" style="background-color:rgb(177, 3, 171, 0.8)">
                <i class="fa fa-home"></i>
                <span>
                    <h5>Strada Nicolae Titulescu 106</h5>
                    <p>Târgu Jiu, Romania</p>
                </span>
            </div>
            <div class="chenar" style="background-color:rgb(177, 3, 171)">
                <i class="fa fa-instagram"></i>
                <span>
                    <h5>2.besmart</h5>
                    <p>Fii la curent cu toate noutățile</p>
                </span>
            </div>
            <div class="chenar" style="background-color:rgb(177, 3, 171, 0.6)">
                <i class="fa fa-envelope"></i>
                <span>
                    <h5>2besmart.contact@gmail.com</h5>
                    <p>Contactați-ne pentru orice întrebare</p>
                </span>
            </div>
        </div>

        <div class="map">
            <iframe
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d11280.429260459337!2d23.26258656787268!3d45.02274693711929!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x474d8a72f2937d0b%3A0x4b6d50e8238d6c8a!2sColegiul%20Na%C8%9Bional%20%22Spiru%20Haret%22!5e0!3m2!1sro!2sro!4v1782038644927!5m2!1sro!2sro"
                width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy"
                referrerpolicy="no-referrer-when-downgrade"></iframe>
        </div>
    </section>

    <script>
        const BACKEND_BASE_URL = "https://backend-k5ed.onrender.com";

        const stars = document.querySelectorAll("#stars-rating-container .star");
        const ratingInput = document.getElementById("reviewRating");

        stars.forEach((star, index) => {
            star.addEventListener("click", () => {
                const currentRating = index + 1;
                ratingInput.value = currentRating;
                updateStars(currentRating);
            });

            star.addEventListener("mouseover", () => {
                updateStars(index + 1);
            });

            star.addEventListener("mouseleave", () => {
                updateStars(ratingInput.value);
            });
        });

        function updateStars(rating) {
            stars.forEach((star, index) => {
                if (index < rating) {
                    star.style.color = "#f1c40f";
                } else {
                    star.style.color = "#ccc";
                }
            });
        }

        updateStars(5);


        document.getElementById("reviewForm").addEventListener("submit", async (e) => {
            e.preventDefault();

            const name = document.getElementById("reviewName").value;
            const rating = ratingInput.value;
            const text = document.getElementById("reviewText").value;
            const messageDiv = document.getElementById("formMessage");

            messageDiv.style.color = "#333";
            messageDiv.innerText = "Se trimite...";

            try {
                const response = await fetch(`${BACKEND_BASE_URL}/reviews`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ name, rating, text })
                });

                const result = await response.json();

                if (response.ok && result.success) {
                    messageDiv.style.color = "#27ae60";
                    messageDiv.innerText = "Mulțumim! Recenzia a fost salvată cu succes.";

                    document.getElementById("reviewForm").reset();
                    updateStars(5);

                    setTimeout(() => {
                        window.location.href = "index.html";
                    }, 2000);

                } else {
                    messageDiv.style.color = "#e74c3c";
                    messageDiv.innerText = result.error || "Eroare la salvare.";
                }
            } catch (error) {
                console.error("Eroare:", error);
                messageDiv.style.color = "#e74c3c";
                messageDiv.innerText = "Serverul nu a putut fi contactat.";
            }
        });

        // 4. Formularul de contact
        const form = document.getElementById('contactForm');
        const statusDiv = document.getElementById('status');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const data = {
                name: document.getElementById('name').value,
                fromEmail: document.getElementById('email').value,
                subject: document.getElementById('subject').value,
                message: document.getElementById('message').value
            };

            statusDiv.textContent = "Se trimite...";
            statusDiv.style.color = "#3498db";

            try {
                const response = await fetch(`${BACKEND_BASE_URL}/send-email`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(data)
                });

                if (!response.ok) {
                    throw new Error(`Eroare server: ${response.status}`);
                }

                const result = await response.json();

                if (result.success) {
                    statusDiv.textContent = "Email trimis cu succes!";
                    statusDiv.style.color = "#2ecc71";
                    form.reset();
                } else {
                    statusDiv.textContent = "Eroare la trimitere pe server.";
                    statusDiv.style.color = "#e74c3c";
                }
            } catch (err) {
                console.error("Eroare la rețea/server:", err);
                statusDiv.textContent = "Eroare de conexiune la server.";
                statusDiv.style.color = "#e74c3c";
            }
        });

        window.addEventListener('scroll', function () {
            const scrollPosition = window.scrollY;
            const waves = document.querySelectorAll('.wave');
            const container = document.querySelector('.container');

            // 1. Valurile urcă instant și rapid la scroll pentru a mătura textul
            waves.forEach(wave => {
                wave.style.transform = `translateY(-${scrollPosition * 1.2}px)`;
            });
            if (container) {
                let containerMove = (scrollPosition) * 0.7;
                container.style.marginTop = `-${containerMove}px`;


            }

        });

        var navLinks = document.getElementById("navLinks");
        function showMenu() {
            navLinks.style.right = "0";
        }
        function hideMenu() {
            navLinks.style.right = "-200px";
        }

    </script>
</body>

</html>
